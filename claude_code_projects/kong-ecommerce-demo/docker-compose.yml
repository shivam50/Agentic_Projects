version: "3.8"

# ─────────────────────────────────────────────────────────────
#  Kong E-Commerce Demo
#  Architecture:
#    products-service  ─┐
#    orders-service    ─┼──► Kong (8000) ─► Browser
#    users-service     ─┘
#    Keycloak  (8080)  – OIDC provider
#    Frontend  (3000)  – SPA
# ─────────────────────────────────────────────────────────────

services:

  # ─── Application Database ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecom-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecom-net

  # ─── Microservices ───────────────────────────────────────
  products-service:
    build: ./services/products
    container_name: ecom-products
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/products_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecom-net

  orders-service:
    build: ./services/orders
    container_name: ecom-orders
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/orders_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecom-net

  users-service:
    build: ./services/users
    container_name: ecom-users
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/users_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecom-net

  # ─── Kong API Gateway (DB-less, OSS) ─────────────────────
  # To enable OIDC plugin, switch image to build: ./kong
  # and uncomment the oidc plugin sections in kong/kong.yml
  kong:
    # image: kong:3.7                  # ← basic routing (default)
    build: ./kong                      # ← enables kong-oidc plugin
    container_name: ecom-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_PLUGINS: bundled,oidc
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"   # ← Kong Proxy  (all API traffic goes here)
      - "8001:8001"   # ← Kong Admin API
      - "8443:8443"
      - "8444:8444"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
    depends_on:
      products-service:
        condition: service_started
      orders-service:
        condition: service_started
      users-service:
        condition: service_started
    networks:
      - ecom-net

  # ─── Keycloak Identity Provider ──────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    container_name: ecom-keycloak-db
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecom-net

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ecom-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - ecom-net

  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: ecom-frontend
    ports:
      - "3000:80"
    depends_on:
      - kong
    networks:
      - ecom-net

volumes:
  postgres-data:
  keycloak-db-data:

networks:
  ecom-net:
    driver: bridge
