_format_version: "3.0"
_transform: true

# ─────────────────────────────────────────────────────────────────────────────
#  Kong E-Commerce Demo – Declarative Configuration (DB-less mode)
#
#  Route map:
#    GET  /api/products*    → products-service:8000  (public)
#    GET  /api/orders*      → orders-service:8000    (protected via OIDC)
#    POST /api/orders*      → orders-service:8000    (protected via OIDC)
#    *    /api/users*       → users-service:8000     (protected via OIDC)
#
#  Phase 1 – Basic routing  : all routes open, CORS + rate-limiting enabled
#  Phase 2 – OIDC enabled   : uncomment oidc plugin blocks below, then:
#                              docker compose restart kong
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Products (public) ──────────────────────────────────────
  - name: products-service
    url: http://products-service:8000
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: products-route
        paths:
          - /api/products
        methods: [GET, POST, PUT, DELETE, OPTIONS, PATCH]
        strip_path: false
        preserve_host: false

  # ── Orders (protected) ────────────────────────────────────
  - name: orders-service
    url: http://orders-service:8000
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: orders-route
        paths:
          - /api/orders
        methods: [GET, POST, PUT, DELETE, OPTIONS, PATCH]
        strip_path: false
        preserve_host: false
    plugins:
      # ── PHASE 2: uncomment to enable OIDC on orders ──────
      # - name: oidc
      #   config:
      #     client_id: kong
      #     client_secret: kong-secret
      #     discovery: http://keycloak:8080/realms/ecommerce/.well-known/openid-configuration
      #     introspection_endpoint: http://keycloak:8080/realms/ecommerce/protocol/openid-connect/token/introspect
      #     bearer_only: "yes"
      #     realm: ecommerce
      #     logout_path: /logout
      #     redirect_after_logout_uri: http://localhost:3000
      # ─────────────────────────────────────────────────────

  # ── Users (protected) ─────────────────────────────────────
  - name: users-service
    url: http://users-service:8000
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: users-route
        paths:
          - /api/users
        methods: [GET, POST, PUT, DELETE, OPTIONS, PATCH]
        strip_path: false
        preserve_host: false
    plugins:
      # ── PHASE 2: uncomment to enable OIDC on users ───────
      # - name: oidc
      #   config:
      #     client_id: kong
      #     client_secret: kong-secret
      #     discovery: http://keycloak:8080/realms/ecommerce/.well-known/openid-configuration
      #     bearer_only: "yes"
      #     realm: ecommerce
      # ─────────────────────────────────────────────────────


# ── Global plugins ────────────────────────────────────────────
plugins:

  # CORS – allow browser requests from the frontend
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "http://localhost:8000"
      methods: [GET, POST, PUT, DELETE, PATCH, OPTIONS, HEAD]
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Length
        - Content-Type
        - Date
        - Origin
        - X-Auth-Token
        - X-User-Id
      exposed_headers:
        - Kong-Request-ID
        - X-Kong-Upstream-Latency
        - X-Kong-Proxy-Latency
      credentials: true
      max_age: 3600
      preflight_continue: false

  # Correlation-ID – adds Kong-Request-ID header (great for tracing in the demo)
  - name: correlation-id
    config:
      header_name: Kong-Request-ID
      generator: uuid
      echo_downstream: true

  # Rate limiting – global 60 req/min
  - name: rate-limiting
    config:
      minute: 60
      policy: local
      hide_client_headers: false

  # Request size limiting
  - name: request-size-limiting
    config:
      allowed_payload_size: 5
      require_content_length: false
