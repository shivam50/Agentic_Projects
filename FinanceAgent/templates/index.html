<!DOCTYPE html>
<html>
<head>
    <title>Finance Anomaly Detector</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">💳 Transaction Audit</h2>
        
        <form action="/audit" method="post" class="mb-4">
            <button type="submit" class="btn btn-primary">🚀 Run AI Anomaly Audit</button>
        </form>

        <table class="table table-white table-hover shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>Date</th>
                    <th>Merchant</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>AI Analysis</th>
                </tr>
            </thead>
            <tbody>
                {% for t in transactions %}
                <tr class="{{ 'table-danger' if t[6] == 'flagged' else '' }}">
                    <td>{{ t[1] }}</td>
                    <td>{{ t[2] }}</td>
                    <td>${{ t[3] }}</td>
                    <td><span class="badge {{ 'bg-danger' if t[6] == 'flagged' else 'bg-secondary' }}">{{ t[6] }}</span></td>
                    <td><small>{{ t[7] if t[7] else 'Not audited yet.' }}</small></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
